name: Daily Stock Intelligence
on:
  schedule:
    - cron: '30 13 * * *' # 11:00 AM NST (Corner Brook Time)
  workflow_dispatch:      # Lets you run it manually via button
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run Bot
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python bot.py
